name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            mill: ./mill
            cache_path: |
              ~/.cache/coursier
              ~/.cache/mill
          - os: macos-latest
            mill: ./mill
            cache_path: |
              ~/Library/Caches/Coursier
              ~/.cache/mill
          - os: windows-latest
            mill: ./mill.bat
            cache_path: |
              ~/AppData/Local/Coursier/cache
              ~/.cache/mill

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # Cache the Mill launcher (~/.cache/mill on every OS) and the Coursier
      # dependency cache (OS-specific default location).
      - name: Cache Mill launcher & JVM dependencies
        uses: actions/cache@v5
        with:
          path: ${{ matrix.cache_path }}
          key: ${{ runner.os }}-mill-${{ hashFiles('build.mill', '.mill-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      # curl/busybox static binaries are gitignored (fetched, not committed). Cache
      # them keyed on the pin/checksum table in refresh-tools.sh, and only
      # re-download on a cache miss. rpm2cpio is committed and needs no download.
      - name: Cache vendored installer tools
        id: tools-cache
        uses: actions/cache@v5
        with:
          path: |
            scalapptainer/resources/scalapptainer/tools/linux-x86_64/curl
            scalapptainer/resources/scalapptainer/tools/linux-x86_64/busybox
            scalapptainer/resources/scalapptainer/tools/linux-aarch64/curl
            scalapptainer/resources/scalapptainer/tools/linux-aarch64/busybox
          key: tools-${{ hashFiles('vendor/refresh-tools.sh') }}

      - name: Vendor static installer tools (curl, busybox)
        if: steps.tools-cache.outputs.cache-hit != 'true'
        shell: bash
        run: bash vendor/refresh-tools.sh

      - name: Compile
        run: ${{ matrix.mill }} scalapptainer.compile

      - name: Test
        run: ${{ matrix.mill }} scalapptainer.test
