name: Release

# Publishes scalapptainer to Maven Central (Sonatype Central Portal). The version
# comes from the pushed tag via VcsVersionModule, so cut a release by tagging:
#
#   git tag 0.1.0 && git push origin 0.1.0
#
# Requires four repository secrets (Settings -> Secrets and variables -> Actions),
# generated once via `./mill mill.javalib.SonatypeCentralPublishModule/initGpgKeys`
# and a user token from https://central.sonatype.com/usertoken:
#   MILL_PGP_SECRET_BASE64, MILL_PGP_PASSPHRASE,
#   MILL_SONATYPE_USERNAME, MILL_SONATYPE_PASSWORD

on:
  push:
    tags:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # VcsVersionModule derives publishVersion from the tag history, so the full
          # history and all tags are required — a shallow checkout would version the
          # build as 0.0.0-… instead of the released tag.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # The static curl/cpio binaries are gitignored and fetched at build time, but
      # they ship inside the published jar (scalapptainer/resources/scalapptainer/tools).
      # Vendor them before publishing or the released artifact is missing them on Linux.
      - name: Vendor static installer tools (curl, cpio)
        shell: bash
        run: bash vendor/refresh-tools.sh

      - name: Publish to Sonatype Maven Central
        run: ./mill mill.javalib.SonatypeCentralPublishModule/
        env:
          MILL_PGP_SECRET_BASE64: ${{ secrets.MILL_PGP_SECRET_BASE64 }}
          MILL_PGP_PASSPHRASE: ${{ secrets.MILL_PGP_PASSPHRASE }}
          MILL_SONATYPE_USERNAME: ${{ secrets.MILL_SONATYPE_USERNAME }}
          MILL_SONATYPE_PASSWORD: ${{ secrets.MILL_SONATYPE_PASSWORD }}

  # Once the release is actually resolvable on Maven Central, rewrite the version
  # strings in the README so the documented dependency coordinates always match the
  # newest release — no manual bump. Gated on a real tag push (skipped for
  # workflow_dispatch, where there is no released version to point at).
  update-readme:
    name: sync README version
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Commit the bump onto main, not the detached tag ref.
          ref: main

      - name: Wait for the release to be resolvable on Maven Central
        shell: bash
        run: |
          # Poll the repository directly (repo1.maven.org), NOT the search index
          # (search.maven.org), which can lag the actual artifact by tens of minutes.
          VERSION="${GITHUB_REF_NAME#v}"
          POM="https://repo1.maven.org/maven2/io/github/dfiantworks/scalapptainer_3/${VERSION}/scalapptainer_3-${VERSION}.pom"
          echo "Polling $POM"
          for i in $(seq 1 60); do
            if curl -sfI "$POM" >/dev/null; then
              echo "available after attempt ${i}"
              exit 0
            fi
            echo "not yet (attempt ${i}/60) — sleeping 60s"
            sleep 60
          done
          echo "timed out waiting for $POM" >&2
          exit 1

      - name: Rewrite the documented version in README
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # All three dependency syntaxes carry the version. Anchor each replacement
          # to the "scalapptainer" coordinate so image names (…/scalapptainer-cowsay),
          # the Apptainer pin, and other numbers are never touched.
          sed -i -E \
            -e "s|(scalapptainer:)[0-9][0-9.]*|\1${VERSION}|g" \
            -e "s|(\"scalapptainer\" % \")[0-9][0-9.]*(\")|\1${VERSION}\2|g" \
            README.md

      - name: Commit and push if the README changed
        shell: bash
        run: |
          if git diff --quiet -- README.md; then
            echo "README already on ${GITHUB_REF_NAME#v}; nothing to do"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "docs: sync README to ${GITHUB_REF_NAME#v} [skip ci]"
          git push origin HEAD:main
