name: E2E (real Apptainer)

# End-to-end tests that exercise a *real* Apptainer (not the mocked RecordingRunner
# unit tests): each job pulls a tiny public image and runs commands in it via the
# HelloDemo example (`./mill examples.runMain demo.HelloDemo`, which pulls docker://alpine:latest and
# execs in it). A non-zero exit — failed pull/run, or a failed/blocked install —
# fails the job, because Scalapptainer throws on those.
#
# Every OS is tested in two modes, asserting both halves of ApptainerInstaller.resolve():
#   - system        — Apptainer is installed first (inside the backend), so Scalapptainer
#                      must reuse it from PATH and must NOT self-install.
#   - scalapptainer — no Apptainer is present, so Scalapptainer performs its own
#                      user-mode install (and we assert the managed binary appeared).
#
# These spin up real backends (WSL2 on Windows, a Lima VM on macOS) which are slow,
# so they are meant to run nightly / on demand rather than on every push. The fast
# unit tests in ci.yml still gate every PR.

on:
  workflow_dispatch:
  # TEMPORARY: also run on PRs while we iterate these jobs to green. Once stable,
  # drop `pull_request` and rely on the nightly schedule + manual dispatch below.
  pull_request:
  schedule:
    - cron: '0 3 * * *' # nightly at 03:00 UTC

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Linux: Apptainer runs directly on the host -----------------------------
  linux:
    name: e2e linux (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [system, scalapptainer]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Vendor static installer tools (curl, busybox)
        shell: bash
        run: bash vendor/refresh-tools.sh

      - name: Install system Apptainer
        if: matrix.mode == 'system'
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer
          apptainer --version

      - name: Ensure no Apptainer is present, and allow rootless user namespaces
        if: matrix.mode == 'scalapptainer'
        run: |
          if command -v apptainer >/dev/null 2>&1; then
            echo "apptainer unexpectedly already on PATH" >&2; exit 1
          fi
          # ubuntu-latest (24.04) restricts unprivileged user namespaces via AppArmor;
          # Scalapptainer's rootless install needs them. Relax it (best-effort).
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Run HelloDemo (real pull + run)
        if: matrix.mode == 'system'
        run: ./mill examples.runMain demo.HelloDemo

      # DIAGNOSTIC (temporary): in scalapptainer mode the demo JVM exited non-zero on
      # one earlier run despite printing correct output (and exec uses check=false, so it
      # cannot fail from an apptainer exit code) — i.e. a signal or a cold-install flake.
      # Characterize it: run the cold-cache demo many times via BOTH mill and direct java
      # (to separate harness from app), and on any failure dump the demo output, the true
      # exit code, dmesg (OOM/segv/apparmor/userns), and a direct apptainer exec.
      - name: Run HelloDemo cold-cache repeatedly (scalapptainer)
        if: matrix.mode == 'scalapptainer'
        run: |
          CP=$(./mill show examples.runClasspath | jq -r 'join(":")')
          millfail=0; javafail=0
          for i in $(seq 1 10); do
            rm -rf "$HOME/.scalapptainer"
            rc=0
            if [ $((i % 2)) -eq 1 ]; then
              method=mill; ./mill examples.runMain demo.HelloDemo >"/tmp/run.$i.log" 2>&1 || rc=$?
            else
              method=java; java -cp "$CP" demo.HelloDemo >"/tmp/run.$i.log" 2>&1 || rc=$?
            fi
            echo "===== iter $i ($method): rc=$rc ====="
            if [ "$rc" -ne 0 ]; then
              if [ "$method" = mill ]; then millfail=$((millfail+1)); else javafail=$((javafail+1)); fi
              echo "--- demo output (tail) ---"; tail -60 "/tmp/run.$i.log" || true
              echo "--- dmesg (tail) ---"; sudo dmesg | tail -80 || true
              APP=$(ls "$HOME"/.scalapptainer/*/bin/apptainer 2>/dev/null || true)
              echo "managed apptainer: ${APP:-<none>}"
              if [ -n "$APP" ]; then
                "$APP" --version || echo "version rc=$?"
                "$APP" exec "$HOME/.scalapptainer/images/alpine.sif" echo direct-after-fail || echo "direct exec rc=$?"
              fi
            fi
          done
          echo "TOTAL failures — mill=$millfail/5 java=$javafail/5"
          [ $((millfail + javafail)) -eq 0 ]

      - name: Assert Scalapptainer did NOT self-install (system reused)
        if: matrix.mode == 'system'
        run: |
          if ls "$HOME"/.scalapptainer/*/bin/apptainer >/dev/null 2>&1; then
            echo "Scalapptainer self-installed despite a system Apptainer being present" >&2
            exit 1
          fi

      - name: Assert Scalapptainer self-installed
        if: matrix.mode == 'scalapptainer'
        run: ls "$HOME"/.scalapptainer/*/bin/apptainer

  # --- Windows: Apptainer runs inside a WSL2 distro via wsl.exe ----------------
  windows:
    name: e2e windows/WSL2 (${{ matrix.mode }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [system, scalapptainer]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # The JVM/Mill run on the Windows host; the vendored Linux tools ship on the
      # classpath and are pushed into WSL at install time, so vendor on the host.
      - name: Vendor static installer tools (curl, busybox)
        shell: bash
        run: bash vendor/refresh-tools.sh

      - name: Set up WSL2 (Ubuntu)
        uses: Vampire/setup-wsl@v3
        with:
          distribution: Ubuntu-22.04
          wsl-version: 2
          set-as-default: 'true'
          additional-packages: ca-certificates

      - name: Install system Apptainer inside WSL
        if: matrix.mode == 'system'
        shell: wsl-bash {0}
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y software-properties-common
          add-apt-repository -y ppa:apptainer/ppa
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y apptainer
          apptainer --version

      - name: Ensure no Apptainer in WSL
        if: matrix.mode == 'scalapptainer'
        shell: wsl-bash {0}
        run: |
          if command -v apptainer >/dev/null 2>&1; then
            echo "apptainer unexpectedly already on the WSL PATH" >&2; exit 1
          fi

      - name: Run HelloDemo (real pull + run, via wsl.exe)
        shell: pwsh
        run: ./mill.bat examples.runMain demo.HelloDemo

      - name: Assert Scalapptainer did NOT self-install (system reused)
        if: matrix.mode == 'system'
        shell: wsl-bash {0}
        run: |
          if ls "$HOME"/.scalapptainer/*/bin/apptainer >/dev/null 2>&1; then
            echo "Scalapptainer self-installed despite a system Apptainer being present" >&2
            exit 1
          fi

      - name: Assert Scalapptainer self-installed
        if: matrix.mode == 'scalapptainer'
        shell: wsl-bash {0}
        run: ls "$HOME"/.scalapptainer/*/bin/apptainer

  # --- macOS: Apptainer runs inside a Lima VM via `limactl shell` --------------
  macos:
    name: e2e macos/Lima (${{ matrix.mode }})
    # Intel runner on purpose: hosted Apple-Silicon macOS runners (macos-14/15/26, i.e.
    # macos-latest) are themselves VMs without nested virtualization, so Lima cannot boot
    # a guest there (vz fatal-exits; qemu aborts with "signal: abort trap"). Intel runners
    # expose HVF, so Lima/QEMU works. macos-26-intel is the current GA Intel runner (the
    # old macos-13 image is being phased out). Same LimaBackend path, x86_64 guest.
    runs-on: macos-26-intel
    strategy:
      fail-fast: false
      matrix:
        mode: [system, scalapptainer]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # The JVM/Mill run on the macOS host; the vendored Linux tools ship on the
      # classpath and are pushed into the VM at install time, so vendor on the host.
      - name: Vendor static installer tools (curl, busybox)
        shell: bash
        run: bash vendor/refresh-tools.sh

      - name: Install and start Lima (instance "default")
        run: |
          brew install lima qemu
          # Backend.detect() / LimaBackend default to the instance named "default"
          # (SCALAPPTAINER_LIMA_INSTANCE). Boot an Ubuntu LTS guest under QEMU (HVF).
          limactl start --name=default --vm-type=qemu --tty=false template:ubuntu-lts
          limactl shell default uname -a

      - name: Install system Apptainer inside the Lima VM
        if: matrix.mode == 'system'
        run: |
          limactl shell default sudo apt-get update
          limactl shell default sudo apt-get install -y software-properties-common
          limactl shell default sudo add-apt-repository -y ppa:apptainer/ppa
          limactl shell default sudo apt-get update
          limactl shell default sudo apt-get install -y apptainer
          limactl shell default apptainer --version

      - name: Ensure no Apptainer in the VM, and allow rootless user namespaces
        if: matrix.mode == 'scalapptainer'
        run: |
          if limactl shell default bash -lc 'command -v apptainer >/dev/null 2>&1'; then
            echo "apptainer unexpectedly already on the VM PATH" >&2; exit 1
          fi
          # Newer Ubuntu guests restrict unprivileged user namespaces via AppArmor.
          limactl shell default sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Run HelloDemo (real pull + run, via limactl shell)
        run: ./mill examples.runMain demo.HelloDemo

      - name: Assert Scalapptainer did NOT self-install (system reused)
        if: matrix.mode == 'system'
        run: |
          if limactl shell default bash -lc 'ls "$HOME"/.scalapptainer/*/bin/apptainer >/dev/null 2>&1'; then
            echo "Scalapptainer self-installed despite a system Apptainer being present" >&2
            exit 1
          fi

      - name: Assert Scalapptainer self-installed
        if: matrix.mode == 'scalapptainer'
        run: limactl shell default bash -lc 'ls "$HOME"/.scalapptainer/*/bin/apptainer'
