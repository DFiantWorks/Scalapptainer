name: E2E (real Apptainer)

# End-to-end tests that exercise a *real* Apptainer (not the mocked RecordingRunner
# unit tests): each job pulls a tiny public image and runs commands in it via the
# HelloDemo example (`./mill examples.runMain demo.HelloDemo`, which pulls docker://alpine:latest and
# execs in it). A non-zero exit — failed pull/run, or a failed/blocked install —
# fails the job, because Scalapptainer throws on those.
#
# Linux and Windows are tested in two modes, asserting both halves of ApptainerInstaller.resolve():
#   - system        — Apptainer is installed first (inside the backend), so Scalapptainer
#                      must reuse it from PATH and must NOT self-install.
#   - scalapptainer — no Apptainer is present, so Scalapptainer performs its own
#                      user-mode install (and we assert the managed binary appeared).
# macOS is the exception: Scalapptainer auto-provisions the Lima VM from the `apptainer`
# template, which ships Apptainer, so it only exercises the reuse-from-PATH path.
#
# These spin up real backends (WSL2 on Windows, a Lima VM on macOS) which are slow,
# so they run on demand only (manual dispatch), not on push/PR. The fast unit tests
# in ci.yml still gate every PR.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Linux: Apptainer runs directly on the host -----------------------------
  linux:
    name: e2e linux (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [system, scalapptainer]
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Vendor static installer tools (curl, busybox)
        shell: bash
        run: bash vendor/refresh-tools.sh

      - name: Install system Apptainer
        if: matrix.mode == 'system'
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer
          apptainer --version

      - name: Ensure no Apptainer is present, and allow rootless user namespaces
        if: matrix.mode == 'scalapptainer'
        run: |
          if command -v apptainer >/dev/null 2>&1; then
            echo "apptainer unexpectedly already on PATH" >&2; exit 1
          fi
          # ubuntu-latest (24.04) restricts unprivileged user namespaces via AppArmor;
          # Scalapptainer's rootless install needs them. Relax it (best-effort).
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      # `mill runMain` occasionally reports "Subprocess failed" even though the demo ran
      # to completion (the program succeeds every time; only mill's subprocess reaping is
      # flaky — its long-lived server is a process subreaper and races with the helper
      # processes apptainer forks). Retry up to 3×; the pull/install is cached after the
      # first attempt, so retries are fast and the real work isn't repeated.
      - name: Run HelloDemo (real pull + run)
        run: |
          for attempt in 1 2 3; do
            echo "::group::HelloDemo attempt $attempt"
            if ./mill examples.runMain demo.HelloDemo; then
              echo "::endgroup::"; exit 0
            fi
            echo "::endgroup::"
            echo "attempt $attempt failed (mill subprocess flake); retrying" >&2
          done
          echo "HelloDemo failed after 3 attempts" >&2
          exit 1

      - name: Assert Scalapptainer did NOT self-install (system reused)
        if: matrix.mode == 'system'
        run: |
          if ls "$HOME"/.scalapptainer/*/bin/apptainer >/dev/null 2>&1; then
            echo "Scalapptainer self-installed despite a system Apptainer being present" >&2
            exit 1
          fi

      - name: Assert Scalapptainer self-installed
        if: matrix.mode == 'scalapptainer'
        run: ls "$HOME"/.scalapptainer/*/bin/apptainer

  # --- Windows: Apptainer runs inside a WSL2 distro via wsl.exe ----------------
  windows:
    name: e2e windows/WSL2 (${{ matrix.mode }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [system, scalapptainer]
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # The JVM/Mill run on the Windows host; the vendored Linux tools ship on the
      # classpath and are pushed into WSL at install time, so vendor on the host.
      - name: Vendor static installer tools (curl, busybox)
        shell: bash
        run: bash vendor/refresh-tools.sh

      - name: Set up WSL2 (Ubuntu)
        uses: Vampire/setup-wsl@v7
        with:
          distribution: Ubuntu-22.04
          wsl-version: 2
          set-as-default: 'true'
          additional-packages: ca-certificates

      - name: Install system Apptainer inside WSL
        if: matrix.mode == 'system'
        shell: wsl-bash {0}
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y software-properties-common
          add-apt-repository -y ppa:apptainer/ppa
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y apptainer
          apptainer --version

      - name: Ensure no Apptainer in WSL
        if: matrix.mode == 'scalapptainer'
        shell: wsl-bash {0}
        run: |
          if command -v apptainer >/dev/null 2>&1; then
            echo "apptainer unexpectedly already on the WSL PATH" >&2; exit 1
          fi

      # Retry the mill run (see the linux job for why mill's subprocess reaping is flaky).
      - name: Run HelloDemo (real pull + run, via wsl.exe)
        shell: pwsh
        run: |
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            Write-Host "HelloDemo attempt $attempt"
            ./mill.bat examples.runMain demo.HelloDemo
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "attempt $attempt failed (mill subprocess flake); retrying"
          }
          Write-Host "HelloDemo failed after 3 attempts"
          exit 1

      - name: Assert Scalapptainer did NOT self-install (system reused)
        if: matrix.mode == 'system'
        shell: wsl-bash {0}
        run: |
          if ls "$HOME"/.scalapptainer/*/bin/apptainer >/dev/null 2>&1; then
            echo "Scalapptainer self-installed despite a system Apptainer being present" >&2
            exit 1
          fi

      - name: Assert Scalapptainer self-installed
        if: matrix.mode == 'scalapptainer'
        shell: wsl-bash {0}
        run: ls "$HOME"/.scalapptainer/*/bin/apptainer

  # --- macOS: Apptainer runs inside a Lima VM via `limactl shell` --------------
  # Unlike the linux/windows jobs, this does NOT set up the backend by hand: the only
  # prerequisite is `brew install lima`, after which Scalapptainer auto-provisions a Lima
  # VM ("scalapptainer") from Lima's `apptainer` template on first use. That template ships
  # Apptainer, so macOS always exercises the "reuse Apptainer from PATH" path (no self-install);
  # the self-install path is covered by the linux/windows jobs.
  macos:
    name: e2e macos/Lima (auto-provision)
    # Intel runner on purpose: hosted Apple-Silicon macOS runners (macos-14/15/26, i.e.
    # macos-latest) are themselves VMs without nested virtualization, so Lima cannot boot
    # a guest there (vz fatal-exits; qemu aborts with "signal: abort trap"). Intel runners
    # expose HVF, so Lima/QEMU works. macos-26-intel is the current GA Intel runner (the
    # old macos-13 image is being phased out). Same LimaBackend path, x86_64 guest.
    runs-on: macos-26-intel
    env:
      # The Intel runner cannot boot Lima's default `vz`; force QEMU for the VM that
      # Scalapptainer auto-provisions. This single knob replaces all the manual VM setup.
      SCALAPPTAINER_LIMA_VM_TYPE: qemu
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Lima (the only manual prerequisite on macOS)
        run: brew install lima qemu

      # Retry the mill run (see the linux job for why mill's subprocess reaping is flaky).
      # The first attempt auto-provisions the Lima VM (image download + Apptainer install),
      # so it is slow; later attempts reuse the running VM.
      - name: Run HelloDemo (auto-provisions Lima, then real pull + run)
        run: |
          for attempt in 1 2 3; do
            echo "::group::HelloDemo attempt $attempt"
            if ./mill examples.runMain demo.HelloDemo; then
              echo "::endgroup::"; exit 0
            fi
            echo "::endgroup::"
            echo "attempt $attempt failed (mill subprocess flake); retrying" >&2
          done
          echo "HelloDemo failed after 3 attempts" >&2
          exit 1

      - name: Assert Scalapptainer auto-provisioned and started the Lima VM
        run: |
          status=$(limactl list scalapptainer --format '{{.Status}}' 2>/dev/null || true)
          echo "scalapptainer instance status: '$status'"
          echo "$status" | grep -qi running

      - name: Assert Scalapptainer reused the template's Apptainer (no self-install)
        run: |
          if limactl shell scalapptainer bash -lc 'ls "$HOME"/.scalapptainer/*/bin/apptainer >/dev/null 2>&1'; then
            echo "Scalapptainer self-installed despite the apptainer template providing Apptainer" >&2
            exit 1
          fi
